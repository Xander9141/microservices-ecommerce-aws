<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Microservices Ecommerce AWS</title>
  <style>
    body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
    header{background:linear-gradient(135deg,#0f172a,#2563eb);color:white;padding:35px}
    main{padding:25px;display:grid;gap:22px}
    .card{background:white;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
    button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 14px;cursor:pointer;margin:4px}
    button:hover{background:#1d4ed8}
    input{padding:10px;border:1px solid #cbd5e1;border-radius:8px;margin:5px}
    pre{background:#0f172a;color:#22c55e;padding:15px;border-radius:12px;overflow:auto}
    .tag{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:6px 10px;border-radius:999px;margin:4px}
  </style>
</head>
<body>

<header>
  <h1>Microservices Ecommerce AWS</h1>
  <p>Frontend + FastAPI + PostgreSQL + Payments Service + Docker Compose</p>
  <span class="tag">Docker</span>
  <span class="tag">FastAPI</span>
  <span class="tag">PostgreSQL</span>
  <span class="tag">Microservices</span>
</header>

<main>

<section class="card">
  <h2>👤 Usuario</h2>
  <input id="username" placeholder="Usuario" value="ramon">
  <input id="password" placeholder="Contraseña" value="1234">
  <button onclick="register()">Registrar</button>
  <button onclick="login()">Iniciar sesión</button>
  <pre id="userResult">Esperando acción...</pre>
</section>

<section>
  <h2>🛒 Productos</h2>
  <div id="products" class="grid"></div>
</section>

<section class="card">
  <h2>📦 Carrito</h2>
  <button onclick="loadCart()">Ver carrito</button>
  <pre id="cartResult">Carrito vacío o no consultado.</pre>
</section>

<section class="card">
  <h2>💳 Pago</h2>
  <button onclick="pay()">Pagar carrito</button>
  <pre id="paymentResult">Pago no ejecutado.</pre>
</section>

</main>

<script>
const API = "http://localhost:8000";

async function loadProducts(){
  const response = await fetch(`${API}/products`);
  const products = await response.json();
  const container = document.getElementById("products");
  container.innerHTML = "";

  if(!products || products.length === 0){
    container.innerHTML = "<div class='card'>No hay productos disponibles.</div>";
    return;
  }

  products.forEach(product=>{
    container.innerHTML += `
      <div class="card">
        <h3>${product.name}</h3>
        <p><b>Precio:</b> $${product.price}</p>
        <button onclick="addToCart(${product.id})">Agregar al carrito</button>
      </div>
    `;
  });
}

async function addToCart(productId){
  await fetch(`${API}/cart`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({product_id:productId,quantity:1})
  });
  await loadCart();
  alert("Producto agregado al carrito");
}

async function loadCart(){
  const response = await fetch(`${API}/cart`);
  const cart = await response.json();
  document.getElementById("cartResult").textContent = JSON.stringify(cart,null,2);
}

async function register(){
  const response = await fetch(`${API}/register`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("username").value,
      password:document.getElementById("password").value
    })
  });
  const result = await response.json();
  document.getElementById("userResult").textContent = JSON.stringify(result,null,2);
}

async function login(){
  const response = await fetch(`${API}/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("username").value,
      password:document.getElementById("password").value
    })
  });
  const result = await response.json();
  document.getElementById("userResult").textContent = JSON.stringify(result,null,2);
}

async function pay(){
  const response = await fetch(`${API}/pay`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user_id:1,amount:25000,method:"debit"})
  });
  const result = await response.json();
  document.getElementById("paymentResult").textContent = JSON.stringify(result,null,2);
}

loadProducts();
</script>

</body>
</html>
