<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ecommerce Microservices AWS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 40px;
    }
    h1 {
      color: #222;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Ecommerce Microservices AWS</h1>
  <p>Frontend conectado a backend FastAPI y microservicio de pagos.</p>

  <h2>Productos</h2>
  <div id="products"></div>

  <script>
    async function loadProducts() {
      const response = await fetch("http://localhost:8000/products");
      const products = await response.json();

      const container = document.getElementById("products");
      container.innerHTML = "";

      products.forEach(product => {
        container.innerHTML += `
          <div class="card">
            <h3>${product.name}</h3>
            <p>Precio: $${product.price}</p>
            <button onclick="addToCart(${product.id})">Agregar al carrito</button>
          </div>
        `;
      });
    }

    async function addToCart(productId) {
      await fetch("http://localhost:8000/cart", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          product_id: productId,
          quantity: 1
        })
      });

      alert("Producto agregado al carrito");
    }

    loadProducts();
  </script>

</body>
</html>
