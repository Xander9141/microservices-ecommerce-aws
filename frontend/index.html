<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ecommerce Microservices AWS</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:0; }
    header { background:#111827; color:white; padding:25px 40px; }
    main { padding:30px 40px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:20px; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
    button { background:#2563eb; color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    input { padding:10px; margin:5px; border-radius:6px; border:1px solid #ccc; }
    pre { background:#111827; color:#22c55e; padding:15px; border-radius:10px; overflow:auto; }
  </style>
</head>
<body>

<header>
  <h1>Ecommerce Microservices AWS</h1>
  <p>Frontend conectado a Backend, PostgreSQL y microservicio de pagos.</p>
</header>

<main>

  <section class="card">
    <h2>Usuario</h2>
    <input id="username" placeholder="Usuario" value="ramon">
    <input id="password" placeholder="Contraseña" value="1234">
    <button onclick="register()">Registrar</button>
    <button onclick="login()">Iniciar sesión</button>
    <pre id="userResult"></pre>
  </section>

  <h2>Productos</h2>
  <div id="products" class="grid"></div>

  <section class="card">
    <h2>Carrito</h2>
    <button onclick="loadCart()">Ver carrito</button>
    <pre id="cartResult"></pre>
  </section>

  <section class="card">
    <h2>Pago</h2>
    <button onclick="pay()">Pagar carrito</button>
    <pre id="paymentResult"></pre>
  </section>

</main>

<script>
const API = "http://localhost:8000";

async function loadProducts() {
  const response = await fetch(`${API}/products`);
  const products = await response.json();
  const container = document.getElementById("products");

  container.innerHTML = "";

  products.forEach(product => {
    container.innerHTML += `
      <div class="card">
        <h3>${product.name}</h3>
        <p>Precio: $${product.price}</p>
        <button onclick="addToCart(${product.id})">Agregar al carrito</button>
      </div>
    `;
  });
}

async function addToCart(productId) {
  await fetch(`${API}/cart`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({product_id: productId, quantity: 1})
  });
  alert("Producto agregado al carrito");
}

async function loadCart() {
  const response = await fetch(`${API}/cart`);
  const cart = await response.json();
  document.getElementById("cartResult").textContent = JSON.stringify(cart, null, 2);
}

async function register() {
  const response = await fetch(`${API}/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  const result = await response.json();
  document.getElementById("userResult").textContent = JSON.stringify(result, null, 2);
}

async function login() {
  const response = await fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  const result = await response.json();
  document.getElementById("userResult").textContent = JSON.stringify(result, null, 2);
}

async function pay() {
  const response = await fetch(`${API}/pay`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: 1,
      amount: 25000,
      method: "debit"
    })
  });

  const result = await response.json();
  document.getElementById("paymentResult").textContent = JSON.stringify(result, null, 2);
}

loadProducts();
</script>

</body>
</html>
